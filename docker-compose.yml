services:
  db:
    image: postgres:15-alpine
    container_name: library-api
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./.docker/volumes/dev/postgres:/var/lib/postgresql/data
    ports:
      - '${DB_PORT}:5432'
    networks:
      - cafeteria_network

networks:
  cafeteria_network:
    driver: bridge
